name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: ./core
          push: true
          tags: ghcr.io/${{ github.repository }}/django:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/django:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/django:buildcache,mode=max
      
      - name: Build and push Realtime image
        uses: docker/build-push-action@v5
        with:
          context: ./realtime
          push: true
          tags: ghcr.io/${{ github.repository }}/realtime:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/realtime:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/realtime:buildcache,mode=max
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/realestate
            
            # Pull new images
            docker-compose pull
            
            # Run migrations
            docker-compose run --rm django python manage.py migrate
            
            # Restart services
            docker-compose up -d --build
            
            # Health check
            sleep 10
            curl -f http://localhost:8000/api/health/ || exit 1
      
      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
