version: '3.8'

# Networks for service communication
networks:
  RealEstate:
    driver: bridge

services:

  # Redis - Celery result backend and FastAPI channel layer
  redis:
    image: redis:7-alpine
    container_name: rs-redis
    networks:
      - RealEstate
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # PostgreSQL with pgvector extension
  postgres:
    image: postgres:16-alpine
    container_name: rs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realestate
    ports:
      - "5432:5432"
    networks:
      - RealEstate
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c shared_preload_libraries=vector
      -c "vector.hnsw_dim=1536"

  # RabbitMQ - Celery broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - RealEstate
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Django API
  django:
    build:
      context: ./core
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./core:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=core.settings.local
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/realestate
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
      - rabbitmq
    networks:
      - RealEstate

  # Celery Worker
  celery_worker:
    build:
      context: ./core
      dockerfile: Dockerfile
    command: celery -A core worker -l INFO -Q default,embeddings,ai,notifications
    volumes:
      - ./core:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.local
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/realestate
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - django
      - redis
      - postgres
      - rabbitmq
    networks:
      - RealEstate

  # Celery Beat (scheduler)
  celery_beat:
    build:
      context: ./core
      dockerfile: Dockerfile
    command: celery -A core beat -l INFO
    volumes:
      - ./core:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.local
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/realestate
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - django
      - redis
      - postgres
      - rabbitmq
    networks:
      - RealEstate

  # Flower - Celery monitoring
  flower:
    image: mher/flower:latest
    container_name: rs-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - rabbitmq
      - redis
      - celery_worker
    networks:
      - RealEstate

  # FastAPI Realtime Service (for WebSockets)
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./realtime:/app
    ports:
      - "8001:8001"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.local
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/realestate
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - django
      - redis
      - postgres
    networks:
      - RealEstate

  # AI Service (for embeddings, recommendations, chat)
  ai:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./ai_service:/app
    ports:
      - "8002:8002"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.local
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/realestate
      - REDIS_URL=redis://redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - django
      - redis
      - postgres
    networks:
      - RealEstate

  # Nginx - Reverse proxy
  nginx:
    image: nginx:alpine
    container_name: rs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
    depends_on:
      - django
      - realtime
    networks:
      - RealEstate

volumes:
  redis_data:
  postgres_data:
  rabbitmq_data:
